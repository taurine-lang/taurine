name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-action@stable

    - name: Build
      run: cargo build --release

    - name: Run tests
      run: cargo test --release

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Run formatter check
      run: cargo fmt --check

  build-release:
    needs: test
    if: github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: taurine
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: taurine.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: taurine
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: taurine

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-action@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Create archive
      shell: bash
      run: |
        mkdir -p release
        cp target/${{ matrix.target }}/release/${{ matrix.artifact }} release/
        cp -r std release/ 2>/dev/null || true
        cp README.md release/ 2>/dev/null || true
        
        cd release
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          7z a -tzip ../taurine-${{ matrix.target }}.zip *
        else
          tar -czf ../taurine-${{ matrix.target }}.tar.gz *
        fi

    - name: Upload release artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./taurine-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.zip' || '.tar.gz' }}
        asset_name: taurine-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.zip' || '.tar.gz' }}
        asset_content_type: application/${{ matrix.os == 'windows-latest' && 'zip' || 'gzip' }}

  publish-crate:
    needs: build-release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-action@stable

    - name: Publish to crates.io
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: cargo publish
